# Evaluation Configuration

baseline_model: "Qwen/Qwen2.5-Coder-1.5B-Instruct"
tuned_adapter: "outputs/adapters/dpo"
test_tasks: "data/tasks/test.jsonl"
output_dir: "outputs/evals"
device: mps

models:
  - name: "baseline"
    agent: "baseline"
  - name: "qwen_dpo_final"
    adapter_path: "outputs/adapters/qwen_dpo_final"

splits:
  train: "data/tasks/train.jsonl"
  val: "data/tasks/val.jsonl"
  test: "data/tasks/test.jsonl"

metrics:
  - pass_rate
  - avg_score
  - invalid_action_rate
  - unsafe_action_rate
  - timeout_rate
  - avg_steps

runs:
  train: "data/trajectories/scored_train"
  val: "data/trajectories/scored_val"
  test: "data/trajectories/scored_test"
